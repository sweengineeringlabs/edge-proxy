[package]
name = "edge-proxy"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/sweengineeringlabs/edge"
authors = ["SWE Engineering Labs"]
rust-version = "1.75"
description = "edge — L2 Proxy: dispatch facade (Job, Router, LifecycleMonitor)"
keywords = ["proxy", "orchestration", "facade", "sea", "swe"]
categories = ["development-tools"]

[dependencies]
thiserror = "2"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
parking_lot = "0.12"
edge-domain = { git = "ssh://git@github.com/sweengineeringlabs/edge.git", branch = "dev" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }

[package.metadata.struct-engine]
application_type = "lib"


[lib]
path = "src/lib.rs"
